chimera:
  weaviate:
    url: http://localhost:8081
    class-name: Memory
    mock: false   # set to true for local development without a Weaviate instance
    connect-timeout: 5000
    read-timeout: 10000

  llm:
    provider: groq              # or "mock" for testing
    model: llama-3.3-70b-versatile
    base-url: https://api.groq.com/openai
    api-key: ${GROQ_API_KEY}    # read from environment
    max-tokens: 500
    temperature: 0.7
    mock: false                  # set true to force mock mode

